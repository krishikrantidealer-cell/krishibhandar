name: kisan_sewa_kendra
description: "Krishi Bhandar shopify website's App"

publish_to: 'none'

version: 3.0.5+23

environment:
  sdk: ^3.5.3

dependencies: 
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  http: ^1.6.0
  intl: ^0.20.2
  flutter_localizations:
    sdk: flutter
  url_launcher: ^6.3.2
  share_plus: ^12.0.1
  shared_preferences: ^2.5.5
  package_info_plus: ^8.1.2

  cached_network_image: ^3.4.1
  cached_network_image_plus: ^0.0.5
  flutter_cache_manager: ^3.4.1
  shimmer: ^3.0.0
  flutter_widget_from_html: ^0.17.1
  badges: ^3.2.0

  firebase_core: ^3.13.0
  firebase_analytics: ^11.4.6
  firebase_auth: ^5.5.3
  firebase_app_check: ^0.3.1
  firebase_remote_config: ^5.4.6
  firebase_messaging: ^15.2.6
  flutter_local_notifications: ^17.0.0
  facebook_app_events: ^0.19.0
  razorpay_flutter: ^1.3.6
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  flutter_dotenv: ^6.0.0
  flutter_svg: ^2.0.10+1
  google_fonts: ^8.0.2
  carousel_slider: ^5.1.2
  font_awesome_flutter: ^11.0.0
  appsflyer_sdk: ^6.17.9+1-rc1
  pinput: ^6.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.7

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/
    - .env

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon_foreground.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon_foreground.png"

flutter_native_splash:
  color: "#26842c"
  image: assets/logo_splash.png

  android_12:
    color: "#26842c"
    image: assets/logo_splash.png
  fullscreen: true
